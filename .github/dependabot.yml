# Dependabot configuration for automated dependency management
version: 2
updates:

  # 1. Node.js & Javascript Dependencies (e.g., .mjs tools, server modules)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # 2. Python Ecosystem (e.g., event digestion tools, analytical scripts)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # 3. GitHub Actions CI/CD Workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
